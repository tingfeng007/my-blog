<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #16161f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f5;
    --text2: #8888a0;
    --text3: #55556a;
    --accent: #7c6fff;
    --accent2: #a78bfa;
    --green: #34d399;
    --amber: #fbbf24;
    --pink: #f472b6;
    --blue: #60a5fa;
  }
  html { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; min-height: 100vh; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -5%, rgba(124,111,255,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 35% 25% at 85% 85%, rgba(52,211,153,0.05) 0%, transparent 50%);
    min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

  /* Header */
  .header { margin-bottom: 1.8rem; animation: fadeUp 0.5s ease both; }
  .eyebrow { font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent2); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .eyebrow::before { content: ''; display: block; width: 20px; height: 1px; background: var(--accent2); }
  .title { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 4.5vw, 2.8rem); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; }
  .title span { color: var(--accent2); }
  .subtitle { margin-top: 8px; font-size: 14px; color: var(--text2); font-weight: 300; }

  /* Stats */
  .stats { display: flex; gap: 1.5rem; margin-bottom: 1.8rem; animation: fadeUp 0.5s 0.05s ease both; align-items: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--text); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .stat-divider { width: 0.5px; height: 28px; background: var(--border); }

  /* Toolbar */
  .toolbar { display: flex; gap: 10px; margin-bottom: 2rem; animation: fadeUp 0.5s 0.08s ease both; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; stroke: var(--text3); fill: none; stroke-width: 2.2; pointer-events: none; }
  .search { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 10px; padding: 9px 12px 9px 32px; font-size: 14px; color: var(--text); font-family: 'Noto Sans SC', sans-serif; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,111,255,0.1); }
  .search::placeholder { color: var(--text3); }

  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab { padding: 7px 13px; border: 0.5px solid var(--border); border-radius: 8px; background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .tab:hover { border-color: var(--border2); color: var(--text2); }
  .tab.active { background: rgba(124,111,255,0.1); border-color: rgba(124,111,255,0.4); color: var(--accent2); }

  /* Section */
  .section { margin-bottom: 2rem; animation: fadeUp 0.5s 0.12s ease both; }
  .section-head { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
  .sec-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .section-label { font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); font-weight: 500; }
  .section-line { flex: 1; height: 0.5px; background: var(--border); }
  .section-count { font-size: 11px; color: var(--text3); font-family: 'Syne', sans-serif; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(138px, 1fr)); gap: 8px; }

  /* Card */
  .card { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 13px; padding: 13px 12px; cursor: pointer; text-decoration: none; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.18s, transform 0.15s, background 0.18s; }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); background: #1b1b26; }
  .card:active { transform: scale(0.97); }
  .card-icon { font-size: 22px; line-height: 1; }
  .card-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); }
  .card-desc { font-size: 11px; color: var(--text3); line-height: 1.4; margin-top: -3px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .badge-free  { background: rgba(52,211,153,0.1);  color: var(--green); border: 0.5px solid rgba(52,211,153,0.2); }
  .badge-limit { background: rgba(251,191,36,0.08); color: var(--amber); border: 0.5px solid rgba(251,191,36,0.18); }

  /* Actions */
  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2.5rem; animation: fadeUp 0.5s 0.2s ease both; }
  .action-btn { display: flex; align-items: center; gap: 7px; padding: 8px 15px; border: 0.5px solid var(--border2); border-radius: 9px; background: var(--bg3); color: var(--text2); font-size: 13px; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; transition: all 0.18s; }
  .action-btn:hover { background: var(--bg2); border-color: rgba(124,111,255,0.35); color: var(--text); }
  .action-btn svg { width: 14px; height: 14px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; }

  .tip { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); margin-top: 1.2rem; animation: fadeUp 0.5s 0.25s ease both; }
  .tip-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; display: none; }

  .back-nav { position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 12px 0; margin-bottom: 1.2rem; border-bottom: 0.5px solid var(--border); backdrop-filter: blur(10px); }
  .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--text3); text-decoration: none; font-size: 13px; transition: color 0.2s; }
  .back-link:hover { color: var(--accent2); }
  .back-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 520px) { .grid { grid-template-columns: repeat(2, 1fr); } .stats { gap: 1rem; } }
</style>
</head>

let currentCat = 'all';

function buildStats() {
  let total = 0, free = 0;
  SECTIONS.forEach(s => s.items.forEach(i => { total++; if (i.free) free++; }));
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statFree').textContent = free;
}

function renderCard(item, cat) {
  const a = document.createElement('a');
  a.href = item.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
  a.className = 'card';
  a.dataset.cat = cat; a.dataset.free = item.free;
  a.dataset.tags = (item.name + ' ' + item.desc + ' ' + item.tags).toLowerCase();
  a.innerHTML = `<div class="card-icon">${item.icon}</div><div><div class="card-name">${item.name}</div><div class="card-desc">${item.desc}</div></div><span class="badge ${item.free ? 'badge-free' : 'badge-limit'}">${item.free ? '免费' : '付费'}</span>`;
  return a;
}

function buildSections() {
  const root = document.getElementById('sections-root');

  SECTIONS.forEach(sec => {
    const el = document.createElement('section');
    el.className = 'section'; el.dataset.secId = sec.id; el.dataset.cat = sec.cat;
    el.innerHTML = `<div class="section-head"><span class="sec-dot" style="background:${sec.dot}"></span><span class="section-label">${sec.label}</span><div class="section-line"></div><span class="section-count" id="cnt-${sec.id}">${sec.items.length}</span></div><div class="grid" id="grid-${sec.id}"></div>`;
    root.appendChild(el);
    const grid = document.getElementById('grid-' + sec.id);
    sec.items.forEach(item => grid.appendChild(renderCard(item, sec.cat)));
  });
}

function applyFilter(cat, query) {
  const q = (query || '').toLowerCase().trim();
  let totalVisible = 0;
  SECTIONS.forEach(sec => {
    const secEl = document.querySelector(`[data-sec-id="${sec.id}"]`);
    let visible = 0;
    secEl.querySelectorAll('.card').forEach(card => {
      const show = (cat === 'all' || card.dataset.cat === cat) && (!q || card.dataset.tags.includes(q));
      card.style.display = show ? '' : 'none';
      if (show) { visible++; totalVisible++; }
    });
    secEl.style.display = visible > 0 ? '' : 'none';
    const cnt = document.getElementById('cnt-' + sec.id);
    if (cnt) cnt.textContent = visible;
  });
  document.getElementById('emptyMsg').style.display = totalVisible === 0 ? 'block' : 'none';
}

function switchCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  applyFilter(cat, document.getElementById('searchInput').value);
}

function filterCards(val) { applyFilter(currentCat, val); }
function openVisible() { document.querySelectorAll('.card').forEach(c => { if (c.style.display !== 'none') window.open(c.href, '_blank'); }); }
function openCat(cat) { document.querySelectorAll(`.card[data-cat="${cat}"]`).forEach(c => window.open(c.href, '_blank')); }
function openFree() { document.querySelectorAll('.card[data-free="true"]').forEach(c => { if (c.style.display !== 'none') window.open(c.href, '_blank'); }); }

buildStats();
buildSections();
</script>
</body>
</html>
